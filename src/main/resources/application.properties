server.port=${SERVER_PORT:8080}

# Datasource - DO NOT commit credentials. Override via env vars (SPRING_DATASOURCE_*).
spring.jpa.database=mysql
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shopfood}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
# Production: dat "validate" va de Flyway quan ly schema
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}

# Flyway - baseline-on-migrate=true vi DB hien co da co schema
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# Mail (Gmail SMTP) - dung App Password, KHONG dung mat khau Gmail thuong
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email app config
app.mail.from=${MAIL_FROM:no-reply@shopfood.local}
app.mail.verify-link-base=${MAIL_VERIFY_LINK_BASE:http://localhost:8080/api/auth/verify-email}
app.mail.reset-link-base=${MAIL_RESET_LINK_BASE:http://localhost:3000/reset-password}

# JWT - access ngan han, refresh dai han
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRATION:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION:2592000000}

# Momo Payment Gateway
app.momo.partner-code=${MOMO_PARTNER_CODE:MOMO}
app.momo.access-key=${MOMO_ACCESS_KEY:}
app.momo.secret-key=${MOMO_SECRET_KEY:}
app.momo.endpoint=${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
app.momo.return-url=${MOMO_RETURN_URL:http://localhost:3000/payment/result}
app.momo.ipn-url=${MOMO_IPN_URL:http://localhost:8080/api/payments/momo/ipn}

# Shipping
app.shipping.default-fee=${SHIPPING_DEFAULT_FEE:25000}
app.shipping.free-threshold=${SHIPPING_FREE_THRESHOLD:300000}

# Springdoc - Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Log SQL - tat o production
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.show_sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_SHOW_SQL:false}

# Spring 2.6+ path matching
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# Upload file config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# App config - moved out of code
app.jwt.secret=${APP_JWT_SECRET:}
app.upload.dir=${APP_UPLOAD_DIR:./uploads/images}
app.public.base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
