server.port=${SERVER_PORT:8080}

# Datasource - DO NOT commit credentials. Override via env vars (SPRING_DATASOURCE_*).
spring.jpa.database=mysql
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shopfood}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
# WARNING: use "validate" + flyway/liquibase in production instead of "update"
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}

# Log SQL - tat o production
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.show_sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_SHOW_SQL:false}

# Spring 2.6+ path matching
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

# Upload file config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# App config - moved out of code
app.jwt.secret=${APP_JWT_SECRET:}
app.upload.dir=${APP_UPLOAD_DIR:./uploads/images}
app.public.base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
