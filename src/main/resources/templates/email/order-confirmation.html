<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Xác nhận đơn hàng</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f4f4f4; padding:20px;">
    <div style="max-width:600px; margin:auto; background:#fff; padding:24px; border-radius:8px;">
        <h2 style="color:#00b894;">Đơn hàng #<span th:text="${orderId}">0</span> đã được ghi nhận</h2>
        <p>Xin chào <b th:text="${fullName}">User</b>,</p>
        <p>Cảm ơn bạn đã đặt hàng tại Shopfood. Thông tin đơn hàng:</p>
        <table style="width:100%; border-collapse:collapse; margin:16px 0;">
            <tr><td>Tạm tính:</td><td style="text-align:right;" th:text="${originalAmount}">0</td></tr>
            <tr><td>Giảm voucher:</td><td style="text-align:right;" th:text="${discountAmount}">0</td></tr>
            <tr><td>Phí ship:</td><td style="text-align:right;" th:text="${shippingFee}">0</td></tr>
            <tr style="font-weight:bold; border-top:1px solid #eee;">
                <td>Tổng cộng:</td>
                <td style="text-align:right;" th:text="${totalAmount}">0</td>
            </tr>
        </table>
        <p>Chúng tôi sẽ liên hệ bạn sớm để xác nhận đơn.</p>
    </div>
</body>
</html>
