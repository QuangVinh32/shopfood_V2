<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Xác thực tài khoản</title>
</head>
<body style="font-family: Arial, sans-serif; background:#f4f4f4; padding:20px;">
    <div style="max-width:600px; margin:auto; background:#fff; padding:24px; border-radius:8px;">
        <h2 style="color:#d63031;">Xác thực email Shopfood</h2>
        <p>Xin chào <b th:text="${fullName}">User</b>,</p>
        <p>Cảm ơn bạn đã đăng ký tài khoản. Vui lòng click link dưới đây để xác thực email của bạn (link có hiệu lực trong 24 giờ):</p>
        <p style="text-align:center; margin:30px 0;">
            <a th:href="${verifyLink}"
               style="background:#d63031;color:#fff;padding:12px 24px;border-radius:4px;text-decoration:none;">
                Xác thực ngay
            </a>
        </p>
        <p style="font-size:12px;color:#666;">
            Nếu nút không hoạt động, copy link sau vào trình duyệt:<br/>
            <span th:text="${verifyLink}">link</span>
        </p>
        <hr/>
        <p style="font-size:11px;color:#999;">Nếu bạn không đăng ký tài khoản này, có thể bỏ qua email.</p>
    </div>
</body>
</html>
